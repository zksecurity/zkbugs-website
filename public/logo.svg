<svg xmlns="http://www.w3.org/2000/svg" width="660" height="140" viewBox="0 0 660 140" role="img" aria-labelledby="title desc">
  <title id="title">zkbugs logo for light backgrounds</title>
  <desc id="desc">Transparent-background zkbugs logo with orange fault-mark chip icon and dark zkbugs wordmark.</desc>
  <defs>
    <style>
      .orange{stroke:#ff7a2b;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .dark{fill:#343844}
      .word{font-family:'Arial Black','Montserrat ExtraBold','Inter Black',system-ui,sans-serif;font-weight:900;letter-spacing:-4px}
    </style>
  </defs>

  <!-- icon -->
  <g transform="translate(22 26)" stroke-width="5.5">
    <!-- chip pins -->
    <path class="orange" d="M0 18h13M0 31h13M0 44h13M0 57h13"/>
    <path class="orange" d="M88 18h13M88 31h13M88 44h13M88 57h13"/>
    <!-- rounded chip with deliberate lower-right break/fault gap -->
    <path class="orange" d="M24 0h53a13 13 0 0 1 13 13v52"/>
    <path class="orange" d="M90 74v2a13 13 0 0 1-13 13H24a13 13 0 0 1-13-13V13A13 13 0 0 1 24 0"/>
    <!-- circuit traces -->
    <path class="orange" d="M37 25v20h18"/>
    <path class="orange" d="M37 65V53h33V34"/>
    <circle class="orange" cx="37" cy="25" r="6"/>
    <circle class="orange" cx="37" cy="65" r="6"/>
    <circle class="orange" cx="70" cy="34" r="6"/>
    <circle class="orange" cx="55" cy="45" r="5"/>
    <!-- fault X -->
    <path class="orange" d="M63 54l19 19M82 54L63 73" stroke-width="7"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="93" class="dark word" font-size="68">zkbugs</text>
</svg>
